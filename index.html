<!DOCTYPE html>
<html lang="fr">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>2048</title>
	<link rel="stylesheet" href="main.css">
	<link rel="manifest" href="./manifest.json">
	<meta name="theme-color" content="#8f7a66">
	<link rel="apple-touch-icon" href="./assets/icon.svg">
	<link rel="icon" type="image/svg+xml" href="./assets/icon.svg">
</head>

<body>
	<header>
		<div>
			<h1 style="margin:0">2048</h1>
			<small onclick="document.querySelector('dialog').showModal()"
				style="cursor:pointer; opacity:0.6">Crédits</small>
		</div>
		<div id="score-box" class="box">
			<span style="font-size: 0.7rem; font-weight: bold; opacity:0.8">SCORE</span><br>
			<span id="score" style="font-size: 1.5rem; font-weight: bold;">0</span>
		</div>
	</header>

	<div id="game-container">
		<div class="grid-static">
			<div class="grid">
				<div class="tile tile-empty" style="left:0;top:0;"></div>
				<div class="tile tile-empty" style="left:25%;top:0;"></div>
				<div class="tile tile-empty" style="left:50%;top:0;"></div>
				<div class="tile tile-empty" style="left:75%;top:0;"></div>

				<div class="tile tile-empty" style="left:0;top:25%;"></div>
				<div class="tile tile-empty" style="left:25%;top:25%;"></div>
				<div class="tile tile-empty" style="left:50%;top:25%;"></div>
				<div class="tile tile-empty" style="left:75%;top:25%;"></div>

				<div class="tile tile-empty" style="left:0;top:50%;"></div>
				<div class="tile tile-empty" style="left:25%;top:50%;"></div>
				<div class="tile tile-empty" style="left:50%;top:50%;"></div>
				<div class="tile tile-empty" style="left:75%;top:50%;"></div>

				<div class="tile tile-empty" style="left:0;top:75%;"></div>
				<div class="tile tile-empty" style="left:25%;top:75%;"></div>
				<div class="tile tile-empty" style="left:50%;top:75%;"></div>
				<div class="tile tile-empty" style="left:75%;top:75%;"></div>
			</div>
		</div>
		<div id="tile-layer" class="grid-static"></div>
	</div>
	<div id="game-over" class="hidden">
		<div class="game-over-content">
			<h1>Game Over !</h1>
			<p>Score final : <span id="final-score">0</span></p>
			<button id="retry-btn" onclick="restartGame()">Réessayer</button>
		</div>
	</div>

	<footer>
		<div class="row">
			<button onclick="undo()">RETOUR</button>
			<button onclick="restartGame()">NOUVEAU</button>
		</div>
	</footer>

	<dialog id="credits-dialog" style="border:none; border-radius:8px; padding:20px; line-height:1.6">
		<h3>Crédits Sons</h3>
		<div id="credits-list">
			<p>Sound Effect by <a
				href="https://pixabay.com/users/universfield-28281460/?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=323639">Universfield</a>
			from <a
				href="https://pixabay.com//?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=323639">Pixabay</a>
		</p>
		<p>Sound Effect by <a
				href="https://pixabay.com/users/floraphonic-38928062/?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=188167">floraphonic</a>
			from <a
				href="https://pixabay.com/sound-effects//?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=188167">Pixabay</a>
		</p>
		<p>Sound Effect by <a
				href="https://pixabay.com/users/u_nharq4usid-46743448/?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=255512">u_nharq4usid</a>
			from <a
				href="https://pixabay.com//?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=255512">Pixabay</a>
		</p>
		</div>
		<button onclick="this.closest('dialog').close()" style="margin-top:10px; width:100%">Fermer</button>
	</dialog>
	<script type="module" src="main.mjs"></script>
	<script>
		if ('serviceWorker' in navigator) {
			navigator.serviceWorker.register('./sw.js')
				.catch(err => console.error("Erreur SW:", err));
			// Dans main.mjs
			navigator.serviceWorker.addEventListener('controllerchange', () => {
				// On recharge la page automatiquement dès que le nouveau code est prêt
				window.location.reload();
			});
		}
	</script>
</body>

</html>
