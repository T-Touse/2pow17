<!DOCTYPE html>
<html lang="fr">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>2048</title>
	<link rel="stylesheet" href="main.css">
	<link rel="manifest" href="./manifest.json">
	<meta name="theme-color" content="#8f7a66">
	<link rel="apple-touch-icon" href="./assets/icon.svg">
	<link rel="icon" type="image/svg+xml" href="./assets/icon.svg">
</head>

<body>
	<header>
		<h1 style="margin:0">2048</h1>
		<div id="score-box" class="box">SCORE<br><div id="score">0</span></div>
	</header>
	<div id="game-container">
		<div class="grid-static">
			<div class="grid">
				<div class="tile tile-empty" style="left:0;top:0;"></div>
				<div class="tile tile-empty" style="left:25%;top:0;"></div>
				<div class="tile tile-empty" style="left:50%;top:0;"></div>
				<div class="tile tile-empty" style="left:75%;top:0;"></div>

				<div class="tile tile-empty" style="left:0;top:25%;"></div>
				<div class="tile tile-empty" style="left:25%;top:25%;"></div>
				<div class="tile tile-empty" style="left:50%;top:25%;"></div>
				<div class="tile tile-empty" style="left:75%;top:25%;"></div>

				<div class="tile tile-empty" style="left:0;top:50%;"></div>
				<div class="tile tile-empty" style="left:25%;top:50%;"></div>
				<div class="tile tile-empty" style="left:50%;top:50%;"></div>
				<div class="tile tile-empty" style="left:75%;top:50%;"></div>

				<div class="tile tile-empty" style="left:0;top:75%;"></div>
				<div class="tile tile-empty" style="left:25%;top:75%;"></div>
				<div class="tile tile-empty" style="left:50%;top:75%;"></div>
				<div class="tile tile-empty" style="left:75%;top:75%;"></div>
			</div>
		</div>
		<div id="tile-layer" class="grid-static"></div>
	</div>
	<div id="game-over" class="hidden">
		<div class="game-over-content">
			<h1>Game Over !</h1>
			<p>Score final : <span id="final-score">0</span></p>
			<button id="retry-btn" onclick="initGame()">Réessayer</button>
		</div>
	</div>
	<footer>
		<button onclick="undo()">RETOUR</button>
		<button onclick="initGame()">NOUVEAU</button>
	</footer>
	<script type="module" src="main.mjs"></script>
	<script>
		if ('serviceWorker' in navigator) {
			navigator.serviceWorker.register('./sw.js')
				.catch(err => console.error("Erreur SW:", err));
			// Dans main.mjs
			navigator.serviceWorker.addEventListener('controllerchange', () => {
				// On recharge la page automatiquement dès que le nouveau code est prêt
				window.location.reload();
			});
		}
	</script>
</body>

</html>
